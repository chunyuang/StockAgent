# 新闻筛选配置
# 用于 src/report/news_filter.py
#
# 修改此文件后需要重启服务生效
# 或者调用 config_manager.reload()

# ==================== 第1步：降噪规则 ====================

# 无价值关键词 - 包含这些词的新闻直接删除
noise_keywords:
  # 地方日常会议、地方民生小事
  - "县委"
  - "乡镇"
  - "街道办"
  - "社区"
  - "居委会"
  - "村委"
  - "民政局"
  - "交通局"
  - "城管"
  - "环卫"
  - "物业"
  - "停水"
  - "停电"
  - "停气"
  - "道路施工"
  - "交通管制"
  
  # 非财经新闻
  - "娱乐"
  - "八卦"
  - "明星"
  - "网红"
  - "综艺"
  - "电视剧"
  - "电影上映"
  - "体育赛事"
  - "球赛"
  - "比分"
  - "联赛"
  - "天气预报"
  - "气象"
  - "暴雨预警"
  - "高温预警"
  
  # 海外小国、无关新闻
  - "斯里兰卡"
  - "孟加拉"
  - "尼泊尔"
  - "老挝"
  - "柬埔寨"
  - "缅甸"
  - "非洲联盟"
  - "拉美"
  - "南美"
  - "加勒比"
  
  # 常规无超预期数据
  - "统计局例行"
  - "月度例会"
  - "常规会议"
  - "工作汇报"
  
  # 非龙头小额公告
  - "股东减持"
  - "高管减持"
  - "小额增持"
  - "人事变动"
  - "监事辞职"
  - "会计师变更"
  - "独立董事"
  
  # 社会新闻
  - "车祸"
  - "火灾"
  - "失踪"
  - "寻人"
  - "婚礼"
  - "葬礼"

# 无价值来源正则模式
noise_source_patterns:
  - "地方.*日报"
  - ".*晚报"
  - ".*都市报"
  - ".*晨报"

# 重复/跟进新闻正则模式
duplicate_patterns:
  - "^(续|追踪|跟进|更新)[:：]"
  - "(第\\d+次|再次|继续)"
  - "(最新|持续|进一步)报道"

# ==================== 第2步：重要性打分 ====================

# 来源级别关键词
