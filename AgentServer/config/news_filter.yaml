# ==================== 第4步：输出配置 ====================

# 最终输出限制
# 2026-03-12 调整：扩大上限以保留更多优质部委级政策
output:
  # 最大核心事件数（8→12，保留更多细分赛道机会）
  max_events: 12
  # 最小保留事件数
  min_events: 4
  # 重要性阈值（7→6，覆盖更多关注级事件）
  importance_threshold: 6

# 重要性标签
# 2026-03-12 调整：下调阈值，让中央级政策更容易进入重磅
importance_tags:
  critical: "重磅"      # >= 10分（原≥12，下调以覆盖中央级政策）
  important: "重要"     # 8-9分（原10-11）
  notable: "关注"       # 6-7分（原7-9）
  noise: "噪音"         # <= 5分（原≤6）

# ==================== 第5步：政策级别与Impact质量校验 ====================
# 用于判断事件政策级别、决定是否强制重生成impact
# 支持热更新：修改后调用 config_manager.reload() 即可生效

# 政策级别关键词（用于判断事件级别、决定impact重生成策略）
policy_level_keywords:
  # 国家级（最高优先级，强制触发impact重生成）
  national:
    - "国务院"
    - "中央"
    - "全国人大"
    - "全国政协"
    - "国办"
    - "中共中央"
    - "总书记"
    - "总理"
    - "国家主席"
  
  # 部委级（中优先级，低质量时触发重生成）
  ministry:
    - "工信部"
    - "发改委"
    - "财政部"
    - "商务部"
    - "科技部"
