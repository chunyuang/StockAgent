# 超短策略回测默认配置
# 所有参数默认值都在这里定义，修改后重新构建前端即可生效
# 方便用户快速修改默认参数，无需修改源代码

[dataSource]
# 数据源 period: daily/1min
period = daily
# 起始日期 YYYYMMDD
start_date = 20260120
# 结束日期 YYYYMMDD
end_date = 20260122
# 复权类型 qfq/不复权
adjust_type = qfq

[base]
# 初始资金
initial_cash = 1000000

[globalFilter]
# 排除ST股票
exclude_st = true
# 排除退市股票
exclude_delisting = true
# 排除新股多少天内
exclude_new_stock_days = 60
# 最低日成交额(万元)
min_daily_amount = 500
# 最低换手率(%)
min_turnover_rate = 3

[forceEmpty]
# 启用强制空仓
enabled = true
# 大盘跌幅≥(%) 触发强制空仓
index_drop_pct = 3
# 跌停家数≥ 触发强制空仓
limit_down_count = 50
# 涨停家数< 触发强制空仓
limit_up_count = 10

[sentimentCycle]
# 启用情绪周期加权
enabled = true
# 涨停家数权重
weight_limit_up = 0.25
# 跌停家数权重
weight_limit_down = 0.1
# 炸板率权重
weight_blast_rate = 0.07
# 涨跌家数差异权重
weight_rise_fall_diff = 0.15
# 北向资金流入权重
weight_north_inflow = 0.12

[auctionFilter]
# 启用集合竞价过滤
enabled = true
# 最低竞价涨幅(%)
min_auction_pct = 0.5
# 最高竞价涨幅(%)
max_auction_pct = 7
# 未匹配量必须为正
min_unmatched_volume_positive = true
# 最低竞价成交额(万元)
min_auction_amount = 300
# 最低竞价量比
min_auction_volume_ratio = 1.5

[tradeParams]
# 基础止损(%)
base_stop_loss_pct = 2
# 基础止盈(%)
base_take_profit_pct = 7
# 最大持仓天数
max_hold_days = 3
# 单票最大仓位
max_position_per_stock = 0.3
# 总仓位上限
max_total_position = 0.6
# 佣金率
commission_rate = 0.0003
# 印花税率
stamp_duty_rate = 0.001
# 滑点(%)
slippage_pct = 0.2

[defaultStrategies]
# 默认选中的策略，逗号分隔
# halfway_chase=半路追涨, first_limit_up=首板打板, limit_up_open=涨停开板, leader_buy_dip=龙头低吸, limit_down_qiao=跌停翘板
selected = halfway_chase,first_limit_up,limit_up_open,leader_buy_dip,limit_down_qiao

[halfway_chase]
# 半路追涨 - 最低量比
min_volume_ratio = 1.0
# 涨幅下限(%)
min_pct = 3
# 涨幅上限(%)
max_pct = 5
# 是否启用10点后买入开关
after_10am_only = true
# 最大持仓数
max_hold = 3

[first_limit_up]
# 龙头首板 - 最低流通市值(亿)
min_cap = 50
# 最高流通市值(亿)
max_cap = 500
# 竞价涨幅下限(%)
min_auction_pct = 2
# 竞价涨幅上限(%)
max_auction_pct = 5
# 最低量比
min_volume_ratio = 1.5
# 换手率下限(%)
min_turnover = 3
# 换手率上限(%)
max_turnover = 15
# 是否连板
exclude_link = true

[limit_up_open]
# 龙头连板接力 - 最低流通市值(亿)
min_cap = 20
# 最高流通市值(亿)
max_cap = 200
# 开盘涨幅下限(%) - 连板股开板日常低开,设为-3%
min_open_pct = -3
# 开盘涨幅上限(%)
max_open_pct = 3
# 最低量比
min_volume_ratio = 2.0
# 最小连板数
min_consecutive_limit = 2
# 最大连板数
max_consecutive_limit = 4

[leader_buy_dip]
# 龙头低吸 - 最近N天内新高
recent_high_days = 60
# 回调幅度≥(%)
callback_pct = 15
# 回调幅度≤(%)
callback_pct_max = 30
# 要求缩量回调（成交量小于5日均量）
require_shrink_volume = true
# 最大持仓数
max_hold = 2

[limit_down_qiao]
# 跌停翘板 - 最低流通市值(亿)
min_cap = 20
# 最高流通市值(亿)
max_cap = 200
# 最低换手率(%)
min_turnover = 10
# 翘板最小金额(万元)
min_qiao_amount = 1000
# 跌停原因不是退市
exclude_delisting = true
