# Pre-commit hooks for StockAgent
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
# ============ Python Linting ============
-   repo: https://github.com/PyCQA/ruff-pre-commit
    rev: v0.4.2
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        name: ruff linter (auto-fix)
    -   id: ruff-format
        name: ruff formatter

-   repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
    -   id: black
        args: [--line-length=120]
        name: black formatter

# ============ Python Static Analysis ============
-   repo: https://github.com/PyCQA/pyflakes
    rev: 3.2.0
    hooks:
    -   id: pyflakes
        name: pyflakes (unused imports/variables)

-   repo: https://github.com/PyCQA/pycodestyle
    rev: 2.12.1
    hooks:
    -   id: pycodestyle
        args: [--max-line-length=120, --count]
        name: pycodestyle (PEP8 style)

# ============ General Checks ============
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
        name: trim trailing whitespace
    -   id: end-of-file-fixer
        name: fix end of files
    -   id: check-yaml
        name: check yaml syntax
    -   id: check-json
        name: check json syntax
    -   id: check-merge-conflict
        name: check for merge conflicts
    -   id: check-added-large-files
        args: ['--maxkb=500']
        name: check for large files
    -   id: no-commit-to-branch
        args: ['--branch', 'main']
        name: prevent commit to main
        stages: [commit]
    -   id: detect-private-key
        name: detect private keys

# ============ Frontend (local) ============
-   repo: local
    hooks:
    -   id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint src/ --ext .vue,.ts,.js --max-warnings 0'
        language: system
        types_or: [vue, ts, javascript]
        pass_filenames: false
        always_run: false
